name: Synthesis agent

# Layer 2 of the two-agent journal system. Device agents push raw/
# session files; this workflow pulls them, runs per-session + daily
# LLM synthesis, and commits data/day.json back.

on:
  # Run whenever any device pushes new session data
  push:
    paths:
      - 'raw/sessions-*.json'
      - 'scripts/**'
      - 'config/**'
    branches: [main]

  # Safety-net schedule: twice daily in case a push trigger is missed.
  # 21:00 UTC = 14:00 PT (midday), 07:00 UTC = 00:00 PT (EOD).
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 7 * * *'

  # Manual backfill: workflow_dispatch with an optional date input.
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to synthesize (YYYY-MM-DD). Default: today (America/Los_Angeles).'
        required: false
        type: string

# Cancel in-flight runs when a newer push arrives — synthesis is idempotent
# and we only care about the latest state.
concurrency:
  group: synthesis-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  synthesize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access for the commit-back step
          persist-credentials: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "date=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=America/Los_Angeles date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for raw data
        id: check
        run: |
          if [ -f "raw/sessions-${{ steps.date.outputs.date }}.json" ]; then
            echo "has_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No raw/sessions-${{ steps.date.outputs.date }}.json — no device has synced yet."
          fi

      - name: Summarize per-session (Haiku)
        if: steps.check.outputs.has_data == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/summarize.py --date "${{ steps.date.outputs.date }}"

      - name: Synthesize daily (Sonnet)
        if: steps.check.outputs.has_data == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/synthesize.py --date "${{ steps.date.outputs.date }}"

      - name: Commit report
        if: steps.check.outputs.has_data == 'true'
        run: |
          git config user.name  "synthesis-agent[bot]"
          git config user.email "synthesis-agent@users.noreply.github.com"
          git add data/day.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "synthesis: daily report ${{ steps.date.outputs.date }}"
            # Retry on push conflict — a device agent may have pushed in parallel
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && exit 0
              sleep $((i * 2))
            done
            echo "::error::push failed after 3 retries"
            exit 1
          fi
