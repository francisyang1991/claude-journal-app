patterns:
  - name: esd_unemployment
    any_of:
      - ESD
      - unemployment claim
      - weekly claim
      - job search log
      - jobseeking
      - esdorchard
  - name: wedding
    any_of:
      - wedding
      - venue
      - Yuwen wedding
      - bridal
  - name: family
    any_of:
      - family group chat
      - mom and dad
      - parents visit
  - name: trading
    any_of:
      - SPY
      - NVDA
      - options strategy
      - strike price
      - portfolio rebalance
  - name: pii
    regex:
      - '\b\d{3}-\d{2}-\d{4}\b'
      - '\b4[0-9]{12}(?:[0-9]{3})?\b'
      - '\b5[1-5][0-9]{14}\b'
